name: Deno Deploy

on:
  push:
    branches-ignore:
      - dist/**
    tags-ignore:
      - "**"
  workflow_dispatch:

jobs:
  deploy:
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@codex/deno-2-programmatic
    with:
      project: partner-ubq-fi
      deploy_platform: deno2
      entrypoint: serve.ts
      install_command: deno install
      build_command: deno task build
      runtime_env: |
        STATIC_DIR=out
      index_html_path: out/index.html
      debug_fetch_fail: true
      required_env: |
        DENO_DEPLOY_TOKEN
    secrets: inherit
